name: Deploy to Tencent Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          tar --exclude='.git' --exclude='node_modules' --exclude='data' --exclude='uploads' -czf /tmp/chengjiujka.tar.gz .

          node - <<'NODE'
          const fs = require('fs');
          const webhook = process.env.DINGTALK_WEBHOOK || '';
          const secret = process.env.DINGTALK_SECRET || '';
          if (webhook) {
            fs.writeFileSync('/tmp/dingtalk-config.json', JSON.stringify({ webhook, secret }), 'utf8');
          }
          NODE

          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no /tmp/chengjiujka.tar.gz ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/
          if [ -f /tmp/dingtalk-config.json ]; then
            scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no /tmp/dingtalk-config.json ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/
          fi

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'REMOTE'
            set -e
            cd /home/ubuntu/zhuge-ai-lab/chengjiujka
            PROJECT_NAME=$(basename "$PWD")
            mkdir -p ~/backups/$PROJECT_NAME

            json_count() {
              node -e '
                const fs = require("fs");
                const file = process.argv[1];
                const expected = process.argv[2];
                if (!fs.existsSync(file)) { process.stdout.write("0"); process.exit(0); }
                const value = JSON.parse(fs.readFileSync(file, "utf8"));
                if (expected === "array" && !Array.isArray(value)) throw new Error(`${file} must be an array`);
                if (expected === "object" && (!value || Array.isArray(value) || typeof value !== "object")) throw new Error(`${file} must be an object`);
                process.stdout.write(String(Array.isArray(value) ? value.length : Object.keys(value).length));
              ' "$1" "$2"
            }

            BASELINE_SUBMISSIONS=$(json_count data/submissions.json array)
            BASELINE_USERS=$(json_count data/users.json object)
            echo "Data baseline: submissions=$BASELINE_SUBMISSIONS users=$BASELINE_USERS"

            if [ -d data ]; then
              BACKUP_FILE=~/backups/$PROJECT_NAME/data-$(date +%Y%m%d-%H%M%S).tar.gz
              tar -czf "$BACKUP_FILE" data
              test -s "$BACKUP_FILE"
              tar -tzf "$BACKUP_FILE" >/dev/null

              VERIFY_DIR=$(mktemp -d)
              tar -xzf "$BACKUP_FILE" -C "$VERIFY_DIR"
              BACKUP_SUBMISSIONS=$(json_count "$VERIFY_DIR/data/submissions.json" array)
              BACKUP_USERS=$(json_count "$VERIFY_DIR/data/users.json" object)
              rm -rf "$VERIFY_DIR"
              test "$BACKUP_SUBMISSIONS" = "$BASELINE_SUBMISSIONS"
              test "$BACKUP_USERS" = "$BASELINE_USERS"
              echo "Backup verified: $BACKUP_FILE submissions=$BACKUP_SUBMISSIONS users=$BACKUP_USERS"
              ls -lh "$BACKUP_FILE"
            fi

            tar -xzf /tmp/chengjiujka.tar.gz
            if [ -f /tmp/dingtalk-config.json ]; then
              mkdir -p data
              mv /tmp/dingtalk-config.json data/dingtalk-config.json
              chmod 600 data/dingtalk-config.json
            fi
            npm install --production

            if pm2 describe chengjiujka >/dev/null 2>&1; then
              pm2 restart ecosystem.config.js --only chengjiujka --update-env
            else
              pm2 start ecosystem.config.js --only chengjiujka
            fi
            pm2 save

            if ! systemctl is-enabled --quiet pm2-ubuntu; then
              sudo env PATH="$PATH" pm2 startup systemd -u ubuntu --hp /home/ubuntu
              pm2 save
            fi

            curl -fsS --retry 15 --retry-delay 2 --retry-connrefused http://127.0.0.1:4005/api/health
            POST_SUBMISSIONS=$(json_count data/submissions.json array)
            POST_USERS=$(json_count data/users.json object)
            test "$POST_SUBMISSIONS" -ge "$BASELINE_SUBMISSIONS"
            test "$POST_USERS" -ge "$BASELINE_USERS"
            echo "Data verified after deploy: submissions=$POST_SUBMISSIONS users=$POST_USERS"
            pm2 status chengjiujka
          REMOTE
