<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>成就卡评审台</title>
    <link rel="stylesheet" href="./styles.css?v=20260701-07" />
  </head>
  <body>
    <header class="topbar nav-only">
      <nav class="top-actions" data-page-nav aria-label="页面导航"></nav>
    </header>

    <main class="admin-layout">
      <section class="panel login-panel" id="loginPanel">
        <div>
          <h2>评审入口登录</h2>
          <p>请选择姓名并输入评审秘钥。首次登录的评审人需要先设置自己的秘钥。</p>
        </div>
        <div class="auth-mode-tabs" role="group" aria-label="账号操作">
          <button type="button" class="auth-mode-btn active" id="showLoginModeBtn">登录</button>
          <button type="button" class="auth-mode-btn" id="showRegisterModeBtn">新用户注册</button>
        </div>
        <form class="login-form" id="loginForm">
          <label class="field">
            <span>姓名</span>
            <input id="loginName" name="name" list="reviewUserNames" autocomplete="username" required />
            <datalist id="reviewUserNames">
              <option value="孙立柱"></option>
              <option value="王斌"></option>
              <option value="惠李伟"></option>
              <option value="蒋炳兰"></option>
              <option value="任蒨"></option>
            </datalist>
          </label>
          <label class="field">
            <span>评审秘钥</span>
            <input id="loginSecret" name="secret" type="password" autocomplete="current-password" />
          </label>
          <button type="submit" id="loginBtn">登录</button>
        </form>
        <form class="login-form register-form" id="registerForm" hidden>
          <label class="field">
            <span>姓名</span>
            <input id="registerName" name="name" autocomplete="off" required />
          </label>
          <label class="field">
            <span>设置登录秘钥</span>
            <input id="registerSecret" name="secret" type="password" minlength="4" autocomplete="new-password" required />
          </label>
          <button type="submit" id="registerBtn">注册账号</button>
        </form>
        <form class="login-form setup-form" id="setupForm" hidden>
          <label class="field">
            <span>设置新秘钥</span>
            <input id="setupSecret" name="secret" type="password" minlength="4" autocomplete="new-password" />
          </label>
          <button type="submit" id="setupBtn">设置并进入</button>
        </form>
        <p id="loginMessage" class="message" role="status"></p>
      </section>

      <section id="reviewApp" hidden>
        <section id="reviewPanel" class="admin-module">
        <section class="panel toolbar" id="reviewToolbar">
          <div class="current-user-box">
            <span>当前账号</span>
            <strong id="currentUserLabel">未登录</strong>
          </div>
          <label class="field">
            <span>项目筛选</span>
            <select id="cardFilter">
              <option value="">全部项目</option>
              <option>奋斗者</option>
              <option>分享达人</option>
              <option>业绩之王</option>
              <option>文化先锋</option>
              <option>最美工位</option>
            </select>
          </label>
          <label class="field">
            <span>状态筛选</span>
            <select id="statusFilter">
              <option value="">全部状态</option>
              <option>待评审</option>
              <option>通过</option>
              <option>不通过</option>
              <option>需补资料</option>
            </select>
          </label>
          <label class="field search-field">
            <span>搜索</span>
            <input id="searchInput" placeholder="姓名、部门、项目、说明" />
          </label>
          <div class="toolbar-pager" aria-label="记录切换">
            <button type="button" id="prevRecordBtn" disabled>上一个</button>
            <button type="button" id="nextRecordBtn" disabled>下一个</button>
          </div>
          <button id="loadBtn" type="button">加载记录</button>
          <button id="logoutBtn" type="button" class="secondary-button">退出</button>
        </section>

        <section class="panel card-config-admin" id="cardConfigPanel" hidden>
          <div class="summary-table-head">
            <div>
              <h2>成就卡配置管理</h2>
              <p>仅孙立柱可编辑。保存后申请页和评审页会同步使用最新项目说明。</p>
            </div>
            <button id="saveCardConfigBtn" type="button">确认保存</button>
          </div>
          <div id="cardConfigEditor" class="card-config-grid"></div>
          <p id="cardConfigMessage" class="message" role="status"></p>
        </section>

        <section class="panel permission-admin" id="permissionPanel" hidden>
          <div class="summary-table-head">
            <div>
              <h2>权限管理</h2>
              <p>注册用户默认无页面权限，需孙立柱授权后才能登录系统。</p>
            </div>
            <button id="loadUsersBtn" type="button">刷新用户</button>
          </div>
          <div id="permissionList" class="permission-list"></div>
          <p id="permissionMessage" class="message" role="status"></p>
        </section>

        <section class="summary-row" id="summaryRow"></section>
        <section id="records" class="records"></section>
        <p id="adminMessage" class="message admin-message" role="status"></p>
        </section>
      </section>
    </main>

    <script src="./config.js?v=20260701-01" defer></script>
    <script src="./card-data.js?v=20260611-23" defer></script>
    <script src="./nav.js?v=20260701-03" defer></script>
    <script src="./admin.js?v=20260701-07" defer></script>
  </body>
</html>
