<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>进度查询</title>
    <link rel="stylesheet" href="./styles.css?v=20260713-02" />
  </head>
  <body>
    <header class="topbar nav-only">
      <nav class="top-actions" data-page-nav aria-label="页面导航"></nav>
    </header>

    <main class="layout">
      <section class="panel progress-query-panel">
        <h1>进度查询</h1>
        <form id="progressQueryForm" class="query-form">
          <label class="field">
            <span>姓名 <b>*</b></span>
            <input name="applicantName" autocomplete="name" required />
          </label>
          <label class="field">
            <span>注册秘钥 <b>*</b></span>
            <input name="querySecret" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit">查询进度</button>
        </form>
        <p id="progressMessage" class="message" role="status"></p>
        <div id="progressResults" class="query-result" aria-live="polite"></div>
      </section>
    </main>

    <script src="./config.js?v=20260701-01" defer></script>
    <script src="./nav.js?v=20260713-03" defer></script>
    <script src="./progress.js?v=20260713-01" defer></script>
  </body>
</html>
