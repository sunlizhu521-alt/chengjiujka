<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>成就卡榜单</title>
    <link rel="stylesheet" href="./styles.css?v=20260703-01" />
  </head>
  <body>
    <header class="topbar nav-only">
      <nav class="top-actions" data-page-nav aria-label="页面导航"></nav>
    </header>

    <main class="layout public-passed-layout">
      <section class="panel public-passed-filter">
        <div class="summary-table-head">
          <div>
            <h2>成就卡榜单</h2>
            <p id="passedMessage" class="message" role="status"></p>
          </div>
          <strong id="passedCount" class="filter-count">0 条</strong>
        </div>
        <div class="passed-filter-grid">
          <label class="field">
            <span>关键词</span>
            <input id="passedKeyword" placeholder="姓名、部门、成就卡项目" />
          </label>
          <label class="field">
            <span>部门</span>
            <select id="passedDepartmentFilter">
              <option value="">全部部门</option>
            </select>
          </label>
          <label class="field">
            <span>成就卡项目</span>
            <select id="passedCardFilter">
              <option value="">全部项目</option>
            </select>
          </label>
          <label class="field">
            <span>有效状态</span>
            <select id="passedValidityFilter">
              <option value="">全部</option>
              <option value="active">有效期内</option>
              <option value="expired">已过有效期</option>
            </select>
          </label>
          <label class="field">
            <span>成就卡数量大于</span>
            <input id="passedCardCountMin" type="number" min="0" step="1" placeholder="例如 3" />
          </label>
          <label class="field">
            <span>成就分值大于</span>
            <input id="passedScoreMin" type="number" min="0" step="1" placeholder="例如 20" />
          </label>
          <button id="passedResetBtn" type="button" class="secondary-button">重置筛选</button>
        </div>
      </section>

      <section class="panel passed-chart-panel">
        <div class="passed-chart-grid">
          <article class="passed-chart-card">
            <h2>有效期内卡的数量 <span id="activeCardTotal">0</span></h2>
            <div id="activeCardChart" class="bar-chart" aria-live="polite"></div>
          </article>
          <article class="passed-chart-card">
            <h2>部门的成就卡数量 <span id="departmentCardTotal">0</span></h2>
            <div id="departmentCardChart" class="bar-chart" aria-live="polite"></div>
          </article>
          <article class="passed-chart-card">
            <h2>申报人的成就卡数量 TOP15</h2>
            <div id="applicantTopChart" class="bar-chart" aria-live="polite"></div>
          </article>
        </div>
      </section>

      <section class="panel summary-table-panel">
        <div class="summary-table-head">
          <h2>榜单明细</h2>
        </div>
        <div class="table-wrap">
          <table class="summary-table passed-table">
            <thead>
              <tr>
                <th>序号</th>
                <th>申报人姓名</th>
                <th>人员状态</th>
                <th>所属部门</th>
                <th>成就卡项目</th>
                <th>分值</th>
                <th>有效状态</th>
                <th>申报日期</th>
                <th>评审日期</th>
              </tr>
            </thead>
            <tbody id="passedTableBody">
              <tr>
                <td colspan="9">加载中...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./config.js?v=20260701-01" defer></script>
    <script src="./nav.js?v=20260703-01" defer></script>
    <script src="./passed.js?v=20260702-05" defer></script>
  </body>
</html>
