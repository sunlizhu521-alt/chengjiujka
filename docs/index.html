<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>成就卡申请</title>
    <link rel="stylesheet" href="./styles.css?v=20260703-01" />
  </head>
  <body>
    <header class="topbar nav-only">
      <nav class="top-actions" data-page-nav aria-label="页面导航"></nav>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>一、申报项目</h2>
        <div class="field">
          <span>申报成就卡项目 <b>*</b></span>
          <div class="card-filter" role="group" aria-label="成就卡开放状态筛选">
            <button class="card-filter-btn is-selected" type="button" data-card-filter="open" aria-pressed="true">已开放</button>
            <button class="card-filter-btn" type="button" data-card-filter="closed" aria-pressed="false">暂未开放</button>
          </div>
          <div id="cardChoices" class="card-choice-group" role="radiogroup" aria-label="申报成就卡项目"></div>
        </div>

        <article id="cardInfo" class="card-info" hidden></article>
      </section>

      <form id="applicationForm" class="panel form-panel">
        <h2>二、基础信息</h2>
        <div class="grid">
          <label class="field">
            <span>申报人姓名 <b>*</b></span>
            <input name="applicantName" list="rosterNameOptions" autocomplete="name" required />
            <datalist id="rosterNameOptions"></datalist>
          </label>
          <label class="field">
            <span>所属部门 <b>*</b></span>
            <select name="department" required>
              <option value="">请选择所属部门</option>
              <option>集团总办</option>
              <option>国内事业部</option>
              <option>供应链管理中心</option>
              <option>海外事业一部</option>
              <option>海外事业二部</option>
              <option>产研中心</option>
              <option>视觉影视部</option>
              <option>行政部</option>
              <option>人力资源部</option>
              <option>品牌市场部</option>
              <option>财务中心</option>
              <option>全球招商部</option>
              <option>电控生产部</option>
              <option>销售-工厂</option>
            </select>
          </label>
          <label class="field">
            <span>岗位 <b>*</b></span>
            <input name="position" required />
          </label>
          <label class="field">
            <span>联系方式</span>
            <input name="contact" autocomplete="tel" />
          </label>
          <label class="field">
            <span>申报日期 <b>*</b></span>
            <input type="date" name="applicationDate" required />
          </label>
        </div>

        <h2>三、申报内容</h2>
        <label class="field">
          <span>文字说明 <b>*</b></span>
          <textarea name="description" rows="7" required placeholder="请填写申请原因、具体事项、发生时间、过程、结果或影响。"></textarea>
        </label>
        <div class="field">
          <span>材料上传</span>
          <div class="upload-box">
            <input id="attachmentInput" class="upload-input" type="file" name="attachments" multiple />
            <label class="upload-trigger" for="attachmentInput">
              <span class="upload-icon" aria-hidden="true">+</span>
              <span class="upload-main">选择或继续添加材料</span>
              <span class="upload-sub">文件、图片等类型不限，单个文件最大 50MB，最多 10 个</span>
            </label>
            <div class="upload-meta">
              <span id="uploadCount">已选 0/10</span>
              <span>后选文件会追加，不会覆盖之前文件</span>
            </div>
          </div>
        </div>
        <div id="attachmentList" class="selected-files" aria-live="polite"></div>

        <h2>四、提交确认</h2>
        <label class="field" id="querySecretField">
          <span>设置查询秘钥</span>
          <input type="password" name="querySecret" autocomplete="new-password" minlength="4" placeholder="首次申请请设置至少4位秘钥" />
          <small id="querySecretHint">首次申请必填；同一姓名后续申请会自动沿用之前设置的查询秘钥。</small>
        </label>
        <label class="checkline">
          <input type="checkbox" name="commitment" value="我确认" required />
          <span>本人承诺以上申报内容真实有效</span>
        </label>

        <div class="actions">
          <button type="submit">提交申请</button>
          <p id="message" class="message" role="status"></p>
        </div>
      </form>

      <section class="panel query-panel" hidden>
        <h2>五、查询评审结果</h2>
        <form id="resultQueryForm" class="query-form">
          <label class="field">
            <span>申报人姓名 <b>*</b></span>
            <input name="applicantName" autocomplete="name" required />
          </label>
          <label class="field">
            <span>查询秘钥 <b>*</b></span>
            <input type="password" name="querySecret" autocomplete="current-password" required />
          </label>
          <button type="submit">查询结果</button>
        </form>
        <div id="queryResult" class="query-result" aria-live="polite"></div>
      </section>
    </main>

    <script src="./config.js?v=20260701-01" defer></script>
    <script src="./card-data.js?v=20260611-24" defer></script>
    <script src="./nav.js?v=20260705-01" defer></script>
    <script src="./app.js?v=20260703-03" defer></script>
  </body>
</html>
