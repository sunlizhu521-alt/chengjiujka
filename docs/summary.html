<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>成就卡评审结果汇总</title>
    <link rel="stylesheet" href="./styles.css?v=20260713-01" />
  </head>
  <body>
    <header class="topbar nav-only">
      <nav class="top-actions" data-page-nav aria-label="页面导航"></nav>
    </header>

    <main class="admin-layout">
      <section class="panel summary-toolbar">
        <label class="field token-field">
          <span>姓名</span>
          <input id="adminName" list="summaryUserNames" autocomplete="username" placeholder="请输入姓名" />
          <datalist id="summaryUserNames">
            <option value="孙立柱"></option>
            <option value="王斌"></option>
            <option value="惠李伟"></option>
            <option value="蒋炳兰"></option>
            <option value="任蒨"></option>
          </datalist>
        </label>
        <label class="field token-field">
          <span>登录秘钥</span>
          <input id="adminSecret" type="password" placeholder="请输入登录秘钥" />
        </label>
        <label class="field">
          <span>项目筛选</span>
          <select id="cardFilter">
            <option value="">全部项目</option>
            <option>奋斗者</option>
            <option>分享达人</option>
            <option>业绩之王</option>
            <option>文化先锋</option>
            <option>最美工位</option>
          </select>
        </label>
        <label class="field">
          <span>结果筛选</span>
          <select id="statusFilter">
            <option value="">全部结果</option>
            <option>待评审</option>
            <option>通过</option>
            <option>不通过</option>
          </select>
        </label>
        <label class="field search-field">
          <span>搜索</span>
          <input id="searchInput" placeholder="编号、姓名、部门、岗位、申请内容" />
        </label>
        <div class="summary-toolbar-actions">
          <button id="bulkDeleteBtn" class="danger-button" type="button" disabled>批量删除</button>
          <button id="loadBtn" type="button">加载汇总</button>
        </div>
      </section>

      <section class="summary-row" id="summaryRow"></section>
      <section class="panel summary-table-panel">
        <div class="summary-table-head">
          <h2>所有申请信息汇总</h2>
          <p id="summaryMessage" class="message" role="status"></p>
        </div>
        <div class="table-wrap">
          <table class="summary-table">
            <thead>
              <tr>
                <th class="summary-select-cell">
                  <input id="summarySelectAll" type="checkbox" aria-label="选择当前筛选结果" />
                </th>
                <th>序号</th>
                <th>申请编号</th>
                <th>申报人</th>
                <th>部门</th>
                <th>岗位</th>
                <th>联系方式</th>
                <th>申请项目</th>
                <th>申请内容</th>
                <th>申请材料</th>
                <th>申报日期</th>
                <th>提交时间</th>
                <th>当前状态</th>
                <th>分值</th>
                <th>评审日期</th>
                <th>最终展示</th>
                <th>承诺确认</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="summaryBody">
              <tr>
                <td colspan="18">请输入管理员秘钥后加载汇总。</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./config.js?v=20260611-13" defer></script>
    <script src="./nav.js?v=20260713-02" defer></script>
    <script src="./summary.js?v=20260713-07" defer></script>
  </body>
</html>
