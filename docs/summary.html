<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>成就卡评审结果汇总</title>
    <link rel="stylesheet" href="./styles.css?v=20260701-05" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Review Summary</p>
        <h1>成就卡评审结果汇总</h1>
      </div>
      <nav class="top-actions" aria-label="页面导航">
        <a class="admin-link" href="./admin.html">评审台</a>
        <a class="admin-link secondary-link" href="./index.html">申请页</a>
      </nav>
    </header>

    <main class="admin-layout">
      <section class="panel summary-toolbar">
        <label class="field token-field">
          <span>管理员姓名</span>
          <select id="adminName">
            <option value="孙立柱">孙立柱</option>
          </select>
        </label>
        <label class="field token-field">
          <span>管理员秘钥</span>
          <input id="adminSecret" type="password" placeholder="请输入管理员秘钥" />
        </label>
        <label class="field">
          <span>项目筛选</span>
          <select id="cardFilter">
            <option value="">全部项目</option>
            <option>奋斗者</option>
            <option>分享达人</option>
            <option>业绩之王</option>
            <option>文化先锋</option>
            <option>最美工位</option>
          </select>
        </label>
        <label class="field">
          <span>结果筛选</span>
          <select id="statusFilter">
            <option value="">全部结果</option>
            <option>待评审</option>
            <option>通过</option>
            <option>不通过</option>
            <option>需补资料</option>
          </select>
        </label>
        <label class="field search-field">
          <span>搜索</span>
          <input id="searchInput" placeholder="姓名、部门、岗位、意见" />
        </label>
        <button id="loadBtn" type="button">加载汇总</button>
      </section>

      <section class="summary-row" id="summaryRow"></section>
      <section class="panel summary-table-panel">
        <div class="summary-table-head">
          <h2>评审结果明细</h2>
          <p id="summaryMessage" class="message" role="status"></p>
        </div>
        <div class="table-wrap">
          <table class="summary-table">
            <thead>
              <tr>
                <th>序号</th>
                <th>申报项目</th>
                <th>申报人</th>
                <th>部门</th>
                <th>岗位</th>
                <th>申报日期</th>
                <th>评审结果</th>
                <th>分值</th>
                <th>投票记录</th>
                <th>评审意见</th>
                <th>评审日期</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="summaryBody">
              <tr>
                <td colspan="12">请输入管理员秘钥后加载汇总。</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./config.js?v=20260611-13" defer></script>
    <script src="./summary.js?v=20260701-03" defer></script>
  </body>
</html>
