<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>成就卡申请表</title>
    <link rel="stylesheet" href="./styles.css?v=20260611-16" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Achievement Card</p>
        <h1>成就卡申请表</h1>
      </div>
      <nav class="top-actions" aria-label="页面导航">
        <a class="admin-link" href="./admin.html">评审入口</a>
        <a class="admin-link secondary-link" href="./summary.html">结果汇总</a>
      </nav>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>一、申报项目</h2>
        <div class="field">
          <span>申报成就卡项目 <b>*</b></span>
          <div id="cardChoices" class="card-choice-group" role="radiogroup" aria-label="申报成就卡项目">
            <button class="card-choice" type="button" data-card-type="奋斗者" aria-pressed="false">奋斗者</button>
            <button class="card-choice" type="button" data-card-type="分享达人" aria-pressed="false">分享达人</button>
            <button class="card-choice" type="button" data-card-type="业绩之王" aria-pressed="false">业绩之王</button>
            <button class="card-choice" type="button" data-card-type="文化先锋" aria-pressed="false">文化先锋</button>
            <button class="card-choice" type="button" data-card-type="最美工位" aria-pressed="false">最美工位</button>
          </div>
        </div>

        <article id="cardInfo" class="card-info" hidden></article>
      </section>

      <form id="applicationForm" class="panel form-panel">
        <h2>二、基础信息</h2>
        <div class="grid">
          <label class="field">
            <span>申报人姓名 <b>*</b></span>
            <input name="applicantName" autocomplete="name" required />
          </label>
          <label class="field">
            <span>所属部门 <b>*</b></span>
            <input name="department" required />
          </label>
          <label class="field">
            <span>岗位 <b>*</b></span>
            <input name="position" required />
          </label>
          <label class="field">
            <span>联系方式</span>
            <input name="contact" autocomplete="tel" />
          </label>
          <label class="field">
            <span>申报日期 <b>*</b></span>
            <input type="date" name="applicationDate" required />
          </label>
        </div>

        <h2>三、申报内容</h2>
        <label class="field">
          <span>文字说明 <b>*</b></span>
          <textarea name="description" rows="7" required placeholder="请填写申请原因、具体事项、发生时间、过程、结果或影响。"></textarea>
        </label>
        <label class="field">
          <span>材料上传 <b>*</b></span>
          <input id="attachmentInput" type="file" name="attachments" multiple />
          <small>可分多次选择文件，后选文件会追加到已选材料中，不会覆盖之前文件；文件类型不限，单个文件最大 50MB，最多 10 个。</small>
        </label>
        <div id="attachmentList" class="selected-files" aria-live="polite"></div>

        <h2>四、提交确认</h2>
        <label class="field">
          <span>设置查询秘钥 <b>*</b></span>
          <input type="password" name="querySecret" autocomplete="new-password" required minlength="4" placeholder="请设置至少4位秘钥，用于后期查询评审结果" />
          <small>请记住该秘钥，后期可使用“申报人姓名 + 查询秘钥”查看评审结果。</small>
        </label>
        <label class="checkline">
          <input type="checkbox" name="commitment" value="我确认" required />
          <span>本人承诺以上申报内容真实有效</span>
        </label>

        <div class="actions">
          <button type="submit">提交申请</button>
          <p id="message" class="message" role="status"></p>
        </div>
      </form>

      <section class="panel query-panel">
        <h2>五、查询评审结果</h2>
        <form id="resultQueryForm" class="query-form">
          <label class="field">
            <span>申报人姓名 <b>*</b></span>
            <input name="applicantName" autocomplete="name" required />
          </label>
          <label class="field">
            <span>查询秘钥 <b>*</b></span>
            <input type="password" name="querySecret" autocomplete="current-password" required />
          </label>
          <button type="submit">查询结果</button>
        </form>
        <div id="queryResult" class="query-result" aria-live="polite"></div>
      </section>
    </main>

    <script src="./config.js?v=20260611-6"></script>
    <script src="./app.js?v=20260611-15"></script>
  </body>
</html>
