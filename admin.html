<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>成就卡评审台</title>
    <link rel="stylesheet" href="./styles.css?v=20260611-20" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Review Desk</p>
        <h1>成就卡评审台</h1>
      </div>
      <nav class="top-actions" aria-label="页面导航">
        <a class="admin-link" href="./summary.html">结果汇总</a>
        <a class="admin-link secondary-link" href="./index.html">申请页</a>
      </nav>
    </header>

    <main class="admin-layout">
      <section class="panel toolbar">
        <label class="field token-field">
          <span>评审口令</span>
          <input id="adminToken" type="password" placeholder="请输入 ADMIN_TOKEN" />
        </label>
        <label class="field">
          <span>项目筛选</span>
          <select id="cardFilter">
            <option value="">全部项目</option>
            <option>奋斗者</option>
            <option>分享达人</option>
            <option>业绩之王</option>
            <option>文化先锋</option>
            <option>最美工位</option>
          </select>
        </label>
        <label class="field">
          <span>状态筛选</span>
          <select id="statusFilter">
            <option value="">全部状态</option>
            <option>待评审</option>
            <option>通过</option>
            <option>不通过</option>
            <option>需补资料</option>
          </select>
        </label>
        <label class="field search-field">
          <span>搜索</span>
          <input id="searchInput" placeholder="姓名、部门、项目、说明" />
        </label>
        <div class="toolbar-pager" aria-label="记录切换">
          <button type="button" id="prevRecordBtn" disabled>上一个</button>
          <button type="button" id="nextRecordBtn" disabled>下一个</button>
        </div>
        <button id="loadBtn" type="button">加载记录</button>
      </section>

      <section class="summary-row" id="summaryRow"></section>
      <section id="records" class="records"></section>
      <p id="adminMessage" class="message admin-message" role="status"></p>
    </main>

    <script src="./config.js?v=20260611-13"></script>
    <script src="./admin.js?v=20260611-21"></script>
  </body>
</html>
